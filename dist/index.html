</style></head> <body data-astro-cid-j7pv25f6> <nav data-astro-cid-j7pv25f6>FinanceHub.bd</nav> <div class="container" data-astro-cid-j7pv25f6> <h1 data-astro-cid-j7pv25f6>Financial Decision Tools</h1> <div class="grid" data-astro-cid-j7pv25f6> <div class="card" data-astro-cid-j7pv25f6> <h2 data-astro-cid-j7pv25f6>ROI Calculator</h2> <label data-astro-cid-j7pv25f6>Investment ($)</label> <input type="number" id="roi-inv" placeholder="1000" data-astro-cid-j7pv25f6> <label data-astro-cid-j7pv25f6>Total Return ($)</label> <input type="number" id="roi-ret" placeholder="1200" data-astro-cid-j7pv25f6> <button onclick="calcROI()" data-astro-cid-j7pv25f6>Calculate ROI</button> <div id="roi-res" class="result-box" data-astro-cid-j7pv25f6></div> </div> <div class="card" data-astro-cid-j7pv25f6> <h2 data-astro-cid-j7pv25f6>Compound Interest</h2> <label data-astro-cid-j7pv25f6>Principal ($)</label> <input type="number" id="ci-p" placeholder="1000" data-astro-cid-j7pv25f6> <label data-astro-cid-j7pv25f6>Annual Rate (%)</label> <input type="number" id="ci-r" placeholder="5" data-astro-cid-j7pv25f6> <label data-astro-cid-j7pv25f6>Years</label> <input type="number" id="ci-t" placeholder="5" data-astro-cid-j7pv25f6> <button onclick="calcCI()" data-astro-cid-j7pv25f6>Calculate</button> <div id="ci-res" class="result-box" data-astro-cid-j7pv25f6></div> </div> </div> </div> <script>
        function calcROI() {
            const i = document.getElementById('roi-inv').value;
            const r = document.getElementById('roi-ret').value;
            const res = document.getElementById('roi-res');
            if(i > 0) {
                const val = ((r - i) / i) * 100;
                res.style.display = 'block';
                res.innerText = `ROI: ${val.toFixed(2)}%`;
            }
        }

        function calcCI() {
            const p = parseFloat(document.getElementById('ci-p').value);
            const r = parseFloat(document.getElementById('ci-r').value) / 100;
            const t = parseFloat(document.getElementById('ci-t').value);
            const res = document.getElementById('ci-res');
            if(p > 0) {
                const amount = p * Math.pow((1 + r), t);
                res.style.display = 'block';
                res.innerText = `Total: $${amount.toFixed(2)}`;
            }
        }
    </script> </body> </html>
